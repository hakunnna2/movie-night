  <text x="190" y="282" text-anchor="middle" font-family="Funnel Sans, Arial, sans-serif" font-size="94" font-weight="800" fill="#0f172a">A</text>
  <text x="322" y="294" text-anchor="middle" font-family="Funnel Sans, Arial, sans-serif" font-size="94" font-weight="800" fill="#0f172a">N</text>

