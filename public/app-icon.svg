  </defs>
  <rect width="512" height="512" rx="144" fill="url(#bg)" />
  <circle cx="256" cy="230" r="178" fill="url(#glow)" />

  <rect x="92" y="80" width="328" height="48" rx="24" fill="url(#frame)" opacity="0.88" />
  <g fill="#0f172a" opacity="0.7">
    <circle cx="130" cy="104" r="6" />
    <circle cx="158" cy="104" r="6" />
    <circle cx="186" cy="104" r="6" />
    <circle cx="326" cy="104" r="6" />
    <circle cx="354" cy="104" r="6" />
    <circle cx="382" cy="104" r="6" />
  </g>

  <g filter="url(#shadow)">
